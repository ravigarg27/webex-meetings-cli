name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run Core Tests
        run: pytest -q tests/unit tests/integration tests/e2e
      - name: Run Contract Tests (Phase-Aware Gate)
        env:
          WEBEX_CONTRACT_GATE_MODE: ${{ ((github.event_name == 'pull_request' && startsWith(github.base_ref, 'release/')) || (github.event_name != 'pull_request' && startsWith(github.ref, 'refs/heads/release/')) || startsWith(github.ref, 'refs/tags/v')) && 'block' || 'warn' }}
        run: |
          echo "Contract gate mode: ${WEBEX_CONTRACT_GATE_MODE}"
          if [ "${WEBEX_CONTRACT_GATE_MODE}" = "warn" ]; then
            pytest -q tests/contracts || echo "::warning::Contract tests failed in warn mode."
          else
            pytest -q tests/contracts
          fi
